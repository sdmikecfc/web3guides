<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"></meta>
<meta name="viewport" content="width=device-width, initial-scale=1.0"></meta>
<title>Launch Wars S2 · Hero variations</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  html, body { margin: 0; padding: 0; }
  .lw-frame {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
    background: #000F16;
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel">
function VariationsApp() {
  const base = 'Conquer%20the%20Seas%20Hero.html';
  return (
    <DesignCanvas>
      <DCSection id="hero-desktop" title="S2 hero · desktop 1440" subtitle="Same hero file, three compositions. Open any frame fullscreen to interact.">
        <DCArtboard id="helm" label="A · Helm — left aligned, gold" width={1440} height={820}>
          <iframe class="lw-frame" title="Helm" src={base + '?v=helm&h=conquer'}></iframe>
        </DCArtboard>
        <DCArtboard id="monument" label="B · Monument — centered, gold" width={1440} height={820}>
          <iframe class="lw-frame" title="Monument" src={base + '?v=monument&h=horizon'}></iframe>
        </DCArtboard>
        <DCArtboard id="chart" label="C · Chart room — glass panel, Doma blue" width={1440} height={820}>
          <iframe class="lw-frame" title="Chart room" src={base + '?v=chart&h=ship'}></iframe>
        </DCArtboard>
      </DCSection>
      <DCSection id="hero-mobile" title="S2 hero · mobile 390" subtitle="Responsive check of variant A.">
        <DCArtboard id="helm-mobile" label="A · Helm — mobile" width={390} height={780}>
          <iframe class="lw-frame" title="Helm mobile" src={base + '?v=helm&h=conquer'}></iframe>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<VariationsApp></VariationsApp>);
</script>
</body>
</html>
